name: agent
description: Default Kimi Code agent

systemPromptPath: ./system.md
promptVars:
  roleAdditional: |
    You are the main Kimi Code agent. You have exclusive access to the `MCPManager` tool,
    which lets you load MCP server groups on demand.

    When the user asks you to load an MCP group, or before you use tools from an MCP group
    that has not been loaded yet, call `MCPManager(action="list_groups")` to see available
    groups, then call `MCPManager(action="load_group", group_name="<group>")` to load it.
    Only after the group reports success should you use the corresponding `mcp__*` tools.

    Do not delegate MCP group loading to a subagent; subagents do not have `MCPManager`.

tools:
  - Read
  - Write
  - Edit
  - Grep
  - Glob
  - Bash
  - TaskList
  - TaskOutput
  - TaskStop
  - CronCreate
  - CronList
  - CronDelete
  - ReadMediaFile
  - TodoList
  - Skill
  - WebSearch
  - Agent
  - AgentSwarm
  - FetchURL
  - MCPManager
  - AskUserQuestion
  - EnterPlanMode
  - ExitPlanMode
  - CreateGoal
  - GetGoal
  - SetGoalBudget
  - UpdateGoal
  - mcp__*

subagents:
  coder:
    description: General software engineering agent — the only subagent type with file-editing tools; use it for any delegated task that must modify code.
  explore:
    description: Fast codebase exploration with prompt-enforced read-only behavior.
  plan:
    description: Read-only implementation planning and architecture design.
  security-analyst:
    description: General security-research coordinator; can load any MCP group on demand.
  android-reverser:
    description: Mobile security role bound to the android MCP group (APK, Jadx, Frida, ADB).
  web-pentester:
    description: Web vulnerability role bound to the web MCP group (Playwright, DevTools, JS hooking).
  binary-reverser:
    description: Desktop binary reverse-engineering role bound to the binary MCP group (IDA, GDB, Frida).
  code-auditor:
    description: Static code-audit role bound to the audit MCP group (Semgrep and scanners).
